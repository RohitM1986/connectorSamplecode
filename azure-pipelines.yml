trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  name: FinOps-Build-VM

variables:
  BuildConfiguration: Release
  SolutionPath: CRMFOpoC.sln
  ArtifactName: LCSDeployablePackage
  LcsZipName: CRMFOpoC_LCS_Deployable.zip
  # Set this in pipeline variables to the real script/exe on your build VM that creates deployable package.
  # Example value:
  # C:\AOSService\PackagesLocalDirectory\bin\CreateDeployablePackage.ps1
  DeployablePackageToolPath: ''

stages:
  - stage: BuildAndPackage
    displayName: Build and Create LCS Package
    jobs:
      - job: Build
        displayName: Build X++ and generate deployable package
        steps:
          - checkout: self

          - task: PowerShell@2
            displayName: Validate Windows FinOps build agent
            inputs:
              targetType: inline
              script: |
                if (-not $IsWindows) {
                  throw "This pipeline must run on a Windows FinOps build VM agent."
                }
                Write-Host "Running on Windows agent: $env:COMPUTERNAME"

          - task: NuGetToolInstaller@1
            displayName: Install NuGet

          - task: NuGetCommand@2
            displayName: NuGet restore
            inputs:
              command: restore
              restoreSolution: '$(SolutionPath)'

          - task: VSBuild@1
            displayName: Build solution
            inputs:
              solution: '$(SolutionPath)'
              platform: 'Any CPU'
              configuration: '$(BuildConfiguration)'
              clean: true

          - task: PowerShell@2
            displayName: Create LCS deployable package (tool path configurable)
            inputs:
              targetType: inline
              script: |
                $tool = "$(DeployablePackageToolPath)"
                if ([string]::IsNullOrWhiteSpace($tool)) {
                  throw "Pipeline variable DeployablePackageToolPath is not set. Set it to the real package-generation tool path on your FinOps build VM."
                }

                if (-not (Test-Path $tool)) {
                  throw "Deployable package tool not found: $tool"
                }

                $outDir = "$(Build.ArtifactStagingDirectory)"
                New-Item -Path $outDir -ItemType Directory -Force | Out-Null

                $zipPath = Join-Path $outDir "$(LcsZipName)"

                if ($tool.EndsWith('.ps1', [System.StringComparison]::OrdinalIgnoreCase)) {
                  & powershell -ExecutionPolicy Bypass -File $tool -OutputPath $zipPath
                }
                else {
                  & $tool -output $zipPath
                }

                if (-not (Test-Path $zipPath)) {
                  throw "Deployable package was not produced: $zipPath"
                }

                Add-Type -AssemblyName System.IO.Compression.FileSystem
                $zip = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
                try {
                  $entry = $zip.Entries | Where-Object { $_.FullName -eq 'HotfixInstallationInfo.xml' } | Select-Object -First 1
                  if (-not $entry) {
                    throw "Invalid LCS package: HotfixInstallationInfo.xml not found in $zipPath"
                  }
                }
                finally {
                  $zip.Dispose()
                }

                Write-Host "LCS deployable package validated: $zipPath"

          - task: PublishBuildArtifacts@1
            displayName: Publish LCS deployable package
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: '$(ArtifactName)'
              publishLocation: Container
